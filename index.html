<!DOCTYPE html>
<html>
<head>
    <title>Home Automation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">HOME AUTOMATION</h1>

<div class="dashboard">

    <!-- LEFT SIDE LIGHTS -->
    <div class="lights" id="devices"></div>

    <!-- RIGHT SIDE FAN -->
    <div class="fan-panel">
        <h2>FAN CONTROL</h2>

        <div class="knob" id="knob">
            <div class="indicator"></div>
        </div>

        <div class="fan-buttons">
            <button class="off-btn" onclick="setSpeed(0)">OFF</button>
            <button onclick="setSpeed(1)">1</button>
            <button onclick="setSpeed(2)">2</button>
            <button onclick="setSpeed(3)">3</button>
        </div>
    </div>

</div>

<div class="apikey-box">
    Firebase API Key:
    <span id="apiKeyDisplay"></span>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
    apiKey: "YOUR_API_KEY_HERE",
    authDomain: "home-automation-a854c.firebaseapp.com",
    databaseURL: "https://home-automation-a854c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "home-automation-a854c",
    storageBucket: "home-automation-a854c.appspot.com",
    messagingSenderId: "1076398156462",
    appId: "1:1076398156462:web:0ebad07e77d29cd2aa1b3f"
};

firebase.initializeApp(firebaseConfig);
</script>

<script src="script.js"></script>

</body>
</html>
